<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nothing to see here...</title>
      <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #080b10;
      --surface:   rgba(12, 17, 28, 0.82);
      --border:    rgba(100, 160, 255, 0.12);
      --accent:    rgba(100, 160, 255, 0.7);
      --text:      #d0dff5;
      --muted:     rgba(140, 165, 210, 0.5);
      --btn-bg:    rgba(100, 160, 255, 0.1);
      --btn-hover: rgba(100, 160, 255, 0.22);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    #canvas {
      position: fixed; inset: 0; z-index: 0;
      will-change: transform;
    }
    #fog {
      position: fixed; inset: -10%; width: 120%; height: 120%;
      z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 40% 60%, rgba(30,60,140,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 70% 30%, rgba(15,40,100,0.10) 0%, transparent 60%);
      will-change: transform;
    }

    /* page blur when zoomed */
    body.zoomed #canvas,
    body.zoomed #fog {
      filter: blur(18px);
      transition: filter 0.3s ease;
    }
    body:not(.zoomed) #canvas,
    body:not(.zoomed) #fog {
      filter: blur(0px);
      transition: filter 0.3s ease;
    }

    #app {
      position: fixed; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4rem 2rem 5rem;
    }

    /* ── viewer box ── */
    #viewer {
      position: relative;
      display: inline-flex;
      align-items: center; justify-content: center;
      max-width: min(960px, 100%);
      max-height: calc(100vh - 9rem);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(100,160,255,0.04);
      overflow: hidden;
      animation: fadeIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
      transition: max-width 0.35s cubic-bezier(0.22,1,0.36,1),
                  max-height 0.35s cubic-bezier(0.22,1,0.36,1);
    }

    /* zoomed state — nearly full viewport */
    body.zoomed #viewer {
      max-width: min(calc(100vw - 3rem), 2400px);
      max-height: calc(100vh - 6rem);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* media fills the box tightly */
    #viewer video,
    #viewer img {
      display: block;
      max-width: min(960px, calc(100vw - 4rem));
      max-height: calc(100vh - 9rem);
      width: auto; height: auto;
      transform-origin: center center;
    }

    body.zoomed #viewer video,
    body.zoomed #viewer img {
      max-width: min(calc(100vw - 3rem), 2400px);
      max-height: calc(100vh - 6rem);
    }

    #viewer video { background: #000; }

    #viewer audio {
      display: block;
      width: 340px;
      margin: 3rem auto;
      filter: invert(1) hue-rotate(180deg) brightness(0.75);
    }

    /* unsupported file icon view */
    #unsupported {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 3.5rem 3rem;
      min-width: 260px;
    }
    #unsupported.show { display: flex; }

    .file-icon-wrap {
      position: relative;
      width: 72px; height: 88px;
    }
    .file-icon-wrap svg { width: 72px; height: 88px; }
    .file-ext-badge {
      position: absolute;
      bottom: 12px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text);
      text-transform: uppercase;
      opacity: 0.85;
    }

    .unsupported-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      word-break: break-all;
      max-width: 260px;
    }
    .unsupported-meta {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-align: center;
    }

    /* error state */
    #error {
      display: none;
      flex-direction: column; align-items: center; gap: 1rem;
      padding: 4rem 2rem; color: var(--muted);
      font-size: 0.85rem;
    }
    #error .icon { font-size: 2.4rem; opacity: 0.4; }
    #error.show { display: flex; }

    /* ── info bar ── */
    #info {
      position: fixed;
      bottom: 1.6rem; left: 1.8rem;
      z-index: 3;
      display: flex; flex-direction: column; gap: 0.3rem;
      animation: fadeIn 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    #filename {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    #meta {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    /* ── action buttons ── */
    #actions {
      position: fixed;
      bottom: 1.6rem; right: 1.8rem;
      z-index: 3;
      display: flex; gap: 0.6rem;
      animation: fadeIn 0.6s 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }

    .btn {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.45rem 0.9rem;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .btn:hover {
      background: var(--btn-hover);
      border-color: rgba(100,160,255,0.3);
    }
    .btn svg { opacity: 0.7; flex-shrink: 0; }

    /* zoom button hidden when not applicable */
    #zoom-btn { display: none; }
    #zoom-btn.visible { display: flex; }

    #back {
      position: fixed;
      top: 1.6rem; left: 1.8rem;
      z-index: 3;
      animation: fadeIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    #viewer.audio-mode {
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }
    .no-animation #canvas,
    .no-animation #fog { display: none; }
    .no-animation #viewer,
    .no-animation #info,
    .no-animation #actions,
    .no-animation #back { animation: none; opacity: 1; transform: none; }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.04); }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="fog"></div>

<div id="app">
  <div id="viewer">
    <div id="error">
      <span class="icon">⚠</span>
      <span id="error-msg">Файл не найден</span>
    </div>
    <div id="unsupported">
      <div class="file-icon-wrap">
        <!-- generic file SVG -->
        <svg viewBox="0 0 72 88" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6C4 2.686 6.686 0 10 0H46L68 22V82C68 85.314 65.314 88 62 88H10C6.686 88 4 85.314 4 82V6Z" fill="rgba(100,160,255,0.08)" stroke="rgba(100,160,255,0.22)" stroke-width="1.2"/>
          <path d="M46 0L68 22H50C47.791 22 46 20.209 46 18V0Z" fill="rgba(100,160,255,0.15)" stroke="rgba(100,160,255,0.22)" stroke-width="1.2"/>
          <rect x="16" y="36" width="40" height="1.5" rx="0.75" fill="rgba(100,160,255,0.25)"/>
          <rect x="16" y="46" width="32" height="1.5" rx="0.75" fill="rgba(100,160,255,0.18)"/>
          <rect x="16" y="56" width="36" height="1.5" rx="0.75" fill="rgba(100,160,255,0.18)"/>
        </svg>
        <span class="file-ext-badge" id="unsupported-ext"></span>
      </div>
      <div class="unsupported-name" id="unsupported-name"></div>
      <div class="unsupported-meta" id="unsupported-meta"></div>
    </div>
  </div>
</div>

<a href="/" id="back" class="btn">
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
    <path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  назад
</a>

<div id="info">
  <div id="filename">—</div>
  <div id="meta"></div>
</div>

<div id="actions">
  <!-- zoom toggle -->
  <a id="dl-btn" class="btn" download>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M6 2v6M3 6l3 3 3-3M2 10h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    скачать
  </a>
</div>

<script>
(function () {

  const lowPerf = (
    navigator.hardwareConcurrency <= 2 ||
    window.matchMedia('(prefers-reduced-motion: reduce)').matches
  );
  if (lowPerf) document.documentElement.classList.add('no-animation');

  /* ── particles ── */
  if (!lowPerf) {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const COUNT = Math.min(160, Math.floor(innerWidth * 0.12));
    class P {
      constructor(ry) { this.reset(ry); }
      reset(ry) {
        this.x = Math.random() * W;
        this.y = ry ? Math.random() * H : H + 10;
        this.r = Math.random() * 1.5 + 0.3;
        this.s = Math.random() * 1.3 + 0.5;
        this.d = (Math.random() - 0.5) * 0.2;
        this.a = Math.random() * 0.65 + 0.15;
        this.ph = Math.random() * Math.PI * 2;
      }
      tick() {
        this.y -= this.s; this.x += this.d; this.ph += 0.018;
        this.ca = this.a * (0.75 + 0.25 * Math.sin(this.ph));
        if (this.y < -6) this.reset(false);
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(110,170,255,${this.ca.toFixed(3)})`;
        ctx.fill();
      }
    }
    const pts = Array.from({ length: COUNT }, () => new P(true));
    function animate() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(8,11,16,0.18)';
      ctx.fillRect(0, 0, W, H);
      pts.forEach(p => { p.tick(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();

    const fog = document.getElementById('fog');
    let tx = 0, ty = 0, cx = 0, cy = 0;
    document.addEventListener('mousemove', e => {
      tx = (e.clientX - innerWidth  / 2) / (innerWidth  / 2);
      ty = (e.clientY - innerHeight / 2) / (innerHeight / 2);
    });
    function ploop() {
      cx += (tx - cx) * 0.06;
      cy += (ty - cy) * 0.06;
      fog.style.transform    = `translate(${cx * 22}px, ${cy * 14}px)`;
      canvas.style.transform = `translate(${cx * 22}px, ${cy * 14}px)`;
      requestAnimationFrame(ploop);
    }
    ploop();
  }

  /* ── zoom ── */
  let zoomed = false;
  window.toggleZoom = function() {
    zoomed = !zoomed;
    document.body.classList.toggle('zoomed', zoomed);
    document.getElementById('zoom-icon-expand').style.display  = zoomed ? 'none'  : '';
    document.getElementById('zoom-icon-collapse').style.display = zoomed ? ''     : 'none';
    document.getElementById('zoom-label').textContent = zoomed ? 'уменьшить' : 'увеличить';
  };

/* ── file loading ── */
  const params   = new URLSearchParams(location.search);
  const fileUrl  = params.get('file');
  const viewer   = document.getElementById('viewer');
  const errorEl  = document.getElementById('error');
  const errorMsg = document.getElementById('error-msg');
  const fnEl     = document.getElementById('filename');
  const metaEl   = document.getElementById('meta');
  const dlBtn    = document.getElementById('dl-btn');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorEl.classList.add('show');
  }

  function formatSize(bytes) {
    if (!bytes || bytes <= 0) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  function getExt(name) {
    const parts = name.split('.');
    return parts.length > 1 ? parts.pop().toLowerCase() : '';
  }

  function getType(ext) {
    if (['mp4','webm','ogg','mov'].includes(ext)) return 'video';
    if (['jpg','jpeg','png','gif','webp','avif','svg'].includes(ext)) return 'image';
    if (['mp3','wav','flac','aac'].includes(ext)) return 'audio';
    return null;
  }

  if (!fileUrl) {
    showError('Не указан файл. Используй ?file=имя_файла');
    fnEl.textContent = 'нет файла';
    return;
  }

  const rawName  = decodeURIComponent(fileUrl.split('/').pop());
  const ext      = getExt(rawName);
  const fileType = getType(ext);

  fnEl.textContent = rawName;
  dlBtn.href = fileUrl;
  dlBtn.setAttribute('download', rawName);

  function fetchSize(callback) {
    fetch(fileUrl, { method: 'HEAD' })
      .then(r => {
        const size = r.headers.get('content-length');
        callback(size ? formatSize(parseInt(size)) : '');
      })
      .catch(() => callback(''));
  }

  /* unsupported */
  if (!fileType) {
    const unsupEl = document.getElementById('unsupported');
    unsupEl.classList.add('show');
    document.getElementById('unsupported-ext').textContent = ext ? '.' + ext : '';
    document.getElementById('unsupported-name').textContent = rawName;
    fetchSize(sizeStr => {
      const parts = [];
      if (ext) parts.push('.' + ext.toUpperCase());
      if (sizeStr) parts.push(sizeStr);
      document.getElementById('unsupported-meta').textContent = parts.join('  ·  ');
      metaEl.textContent = parts.join('  ·  ');
    });
    return; // <-- выходим, дальше не идём
  }

  /* ── создаём медиа-элемент ── */
  let el;

  if (fileType === 'video') {
    el = document.createElement('video');
    el.controls = true;
    el.autoplay = false;
    el.src = fileUrl;
    el.addEventListener('loadedmetadata', () => {
      const d = Math.round(el.duration);
      const m = Math.floor(d / 60), s = d % 60;
      const dim = el.videoWidth ? `${el.videoWidth}×${el.videoHeight}` : '';
      fetchSize(sizeStr => {
        const parts = [];
        if (dim) parts.push(dim);
        parts.push(`${m}:${String(s).padStart(2,'0')}`);
        if (sizeStr) parts.push(sizeStr);
        metaEl.textContent = parts.join('  ·  ');
      });
    });
    el.addEventListener('error', () => showError('Не удалось загрузить видео'));

  } else if (fileType === 'image') {
    el = document.createElement('img');
    el.src = fileUrl;
    el.alt = rawName;
    el.addEventListener('load', () => {
      fetchSize(sizeStr => {
        const parts = [];
        if (el.naturalWidth) parts.push(`${el.naturalWidth}×${el.naturalHeight}`);
        if (sizeStr) parts.push(sizeStr);
        metaEl.textContent = parts.join('  ·  ');
      });
    });
    el.addEventListener('error', () => showError('Не удалось загрузить изображение'));

} else if (fileType === 'audio') {
    // НЕ добавляем audio-mode — пусть viewer остаётся с рамкой и тенью
    el = document.createElement('audio');
    el.controls = true;
    el.src = fileUrl;
    el.addEventListener('loadedmetadata', () => {
      const d = Math.round(el.duration);
      const m = Math.floor(d / 60), s = d % 60;
      fetchSize(sizeStr => {
        const parts = [`${m}:${String(s).padStart(2,'0')}`];
        if (sizeStr) parts.push(sizeStr);
        metaEl.textContent = parts.join('  ·  ');
      });
    });
    el.addEventListener('error', () => showError('Не удалось загрузить аудио'));
  }
  

  /* ── вставляем в DOM ── */
  if (fileType === 'audio' && el) {
    const audioWrap = document.createElement('div');
    // уменьшил padding
audioWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:0rem;padding:2.5rem 1rem 1rem;';

    const iconWrap = document.createElement('div');
    iconWrap.style.cssText = 'position:relative;width:72px;height:88px;';
    iconWrap.innerHTML = `
      <svg viewBox="0 0 72 88" width="72" height="88" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 6C4 2.686 6.686 0 10 0H46L68 22V82C68 85.314 65.314 88 62 88H10C6.686 88 4 85.314 4 82V6Z"
              fill="rgba(100,160,255,0.08)" stroke="rgba(100,160,255,0.22)" stroke-width="1.2"/>
        <path d="M46 0L68 22H50C47.791 22 46 20.209 46 18V0Z"
              fill="rgba(100,160,255,0.15)" stroke="rgba(100,160,255,0.22)" stroke-width="1.2"/>

        <!-- звуковые волны по центру иконки (y≈44) -->
        <!-- источник — маленький прямоугольник -->
        <rect x="30" y="40" width="5" height="9" rx="1.5" fill="rgba(100,160,255,0.65)"/>
        <!-- треугольник-рупор -->
        <path d="M35 41.5 L41 37 L41 52 L35 47.5Z" fill="rgba(100,160,255,0.5)"/>
        <!-- волна 1 -->
        <path d="M43.5 40 C46 42 46 47 43.5 49" stroke="rgba(100,160,255,0.6)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <!-- волна 2 -->
        <path d="M46 37.5 C50 41 50 48 46 51.5" stroke="rgba(100,160,255,0.4)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      </svg>
      <span style="
        position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
        font-size:0.65rem;font-weight:500;letter-spacing:0.06em;
        color:#d0dff5;text-transform:uppercase;opacity:0.85;
        font-family:'JetBrains Mono',monospace;white-space:nowrap;
      ">.${ext}</span>
    `;

    const nameEl = document.createElement('div');
    nameEl.textContent = rawName;
    nameEl.style.cssText = `
      font-size:0.9rem;font-weight:500;color:#d0dff5;
      text-align:center;word-break:break-all;max-width:260px;
      font-family:'JetBrains Mono',monospace;
    `;

    audioWrap.append(iconWrap, nameEl, el);
    viewer.appendChild(audioWrap);
        } else if (el) {
      // video и image — напрямую в viewer
      viewer.appendChild(el);
    }

  /* ── wheel zoom ── */
  let scale = 1;
  const MIN = 1, MAX = 4, STEP = 0.001;

  document.addEventListener('wheel', e => {
    e.preventDefault();
    scale = Math.min(MAX, Math.max(MIN, scale - e.deltaY * STEP));
    const isZoomed = scale > 1.01;
    document.body.classList.toggle('zoomed', isZoomed);
    if (el) el.style.transform = `scale(${scale})`;
    viewer.style.overflow = isZoomed ? 'visible' : 'hidden';
  }, { passive: false });
})();
</script>
</body>
</html>
