<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nothing to see here...</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #080b10;
      --surface:   rgba(12, 17, 28, 0.82);
      --border:    rgba(100, 160, 255, 0.12);
      --accent:    rgba(100, 160, 255, 0.7);
      --text:      #d0dff5;
      --muted:     rgba(140, 165, 210, 0.5);
      --btn-bg:    rgba(100, 160, 255, 0.1);
      --btn-hover: rgba(100, 160, 255, 0.22);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent
    }

    #canvas {
      position: fixed; inset: 0; z-index: 0;
      will-change: transform;
    }
    #fog {
      position: fixed; inset: -10%; width: 120%; height: 120%;
      z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 40% 60%, rgba(30,60,140,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 70% 30%, rgba(15,40,100,0.10) 0%, transparent 60%);
      will-change: transform;
    }

    body.bg-blur #canvas,
    body.bg-blur #fog {
      filter: blur(18px);
      transition: filter 0.3s ease;
    }
    body:not(.bg-blur) #canvas,
    body:not(.bg-blur) #fog {
      filter: blur(0px);
      transition: filter 0.3s ease;
    }

    #app {
      position: fixed; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4rem 2rem 5rem;
    }

    #viewer {
      position: relative;
      display: inline-flex;
      align-items: center; justify-content: center;
      max-width: min(960px, 100%);
      max-height: calc(100vh - 9rem);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(100,160,255,0.04);
      overflow: hidden;
      animation: fadeIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
      transition: background 0.25s ease, border-color 0.25s ease,
                  box-shadow 0.25s ease, backdrop-filter 0.25s ease;
    }

    /* скрываем подложку при зуме */
    #viewer.zoomed-out {
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #viewer video,
    #viewer img {
      display: block;
      max-width: min(960px, calc(100vw - 4rem));
      max-height: calc(100vh - 9rem);
      width: auto; height: auto;
      transform-origin: center center;
    }

    #viewer video { background: #000; }

    #viewer audio {
      display: block;
      width: 340px;
      filter: invert(1) hue-rotate(180deg) brightness(0.75);
    }

    #unsupported {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 3.5rem 3rem;
      min-width: 260px;
    }
    #unsupported.show { display: flex; }

    .file-icon-wrap {
      position: relative;
      width: 72px; height: 88px;
    }
    .file-icon-wrap svg { width: 72px; height: 88px; }
    .file-ext-badge {
      position: absolute;
      bottom: 12px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text);
      text-transform: uppercase;
      opacity: 0.85;
    }

    .unsupported-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      word-break: break-all;
      max-width: 260px;
    }
    .unsupported-meta {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-align: center;
    }

    #error {
      display: none;
      flex-direction: column; align-items: center; gap: 1rem;
      padding: 4rem 2rem; color: var(--muted);
      font-size: 0.85rem;
    }
    #error .icon { font-size: 2.4rem; opacity: 0.4; }
    #error.show { display: flex; }

    #info {
      position: fixed;
      bottom: 1.6rem; left: 1.8rem;
      z-index: 3;
      display: flex; flex-direction: column; gap: 0.3rem;
      animation: fadeIn 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
      transition: opacity 0.25s ease;
    }

    #actions {
      position: fixed;
      bottom: 1.6rem; right: 1.8rem;
      z-index: 3;
      display: flex; gap: 0.6rem;
      animation: fadeIn 0.6s 0.25s cubic-bezier(0.22,1,0.36,1) both;
      transition: opacity 0.25s ease;
    }

    #back {
      position: fixed;
      top: 1.6rem; left: 1.8rem;
      z-index: 3;
      animation: fadeIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
      transition: opacity 0.25s ease;
    }

    #info, #actions, #back {
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.22,1,0.36,1);
    }

    #info.hidden {
      opacity: 0 !important;
      pointer-events: none;
      transform: translateY(6px);
    }

    #actions.hidden {
      opacity: 0 !important;
      pointer-events: none;
      transform: translateY(6px);
    }

    #back.hidden {
      opacity: 0 !important;
      pointer-events: none;
      transform: translateY(-6px);
    }

    #filename {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    #meta {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }
    .btn {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.45rem 0.9rem;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent
    }
    .btn:hover {
      background: var(--btn-hover);
      border-color: rgba(100,160,255,0.3);
    }
    .btn svg { opacity: 0.7; flex-shrink: 0; }

    .no-animation #canvas,
    .no-animation #fog { display: none; }
    .no-animation #viewer,
    .no-animation #info,
    .no-animation #actions,
    .no-animation #back { animation: none; opacity: 1; transform: none; }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.04); }
    }
    #viewer pre::-webkit-scrollbar {
    width: 6px;
    height: 6px;
    }
    #viewer pre::-webkit-scrollbar-track {
      background: transparent;
    }
    #viewer pre::-webkit-scrollbar-thumb {
      background: rgba(100,160,255,0.2);
      border-radius: 3px;
    }
    #viewer pre::-webkit-scrollbar-thumb:hover {
      background: rgba(100,160,255,0.4);
    }
    #viewer {
      transition: background 0.25s ease, border-color 0.25s ease,
                  box-shadow 0.25s ease, backdrop-filter 0.25s ease,
                  max-width 0.35s cubic-bezier(0.22,1,0.36,1),
                  max-height 0.35s cubic-bezier(0.22,1,0.36,1);
    }

    #viewer pre {
      transition: max-width 0.35s cubic-bezier(0.22,1,0.36,1),
                  max-height 0.35s cubic-bezier(0.22,1,0.36,1);
    }
    #zoom-hint {
  position: fixed;
  bottom: 2.4rem;
  left: 50%; transform: translateX(-50%);
  z-index: 4;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  white-space: nowrap;
}
#zoom-hint.show { opacity: 1; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="fog"></div>

<div id="app">
  <div id="viewer">
    <div id="error">
      <span class="icon">⚠</span>
      <span id="error-msg">Файл не найден на сервере</span>
    </div>
    <div id="unsupported">
      <div class="file-icon-wrap">
        <svg viewBox="0 0 72 88" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6C4 2.686 6.686 0 10 0H46L68 22V82C68 85.314 65.314 88 62 88H10C6.686 88 4 85.314 4 82V6Z" fill="rgba(100,160,255,0.08)" stroke="rgba(100,160,255,0.22)" stroke-width="1.2"/>
          <path d="M46 0L68 22H50C47.791 22 46 20.209 46 18V0Z" fill="rgba(100,160,255,0.15)" stroke="rgba(100,160,255,0.22)" stroke-width="1.2"/>
          <rect x="16" y="36" width="40" height="1.5" rx="0.75" fill="rgba(100,160,255,0.25)"/>
          <rect x="16" y="46" width="32" height="1.5" rx="0.75" fill="rgba(100,160,255,0.18)"/>
          <rect x="16" y="56" width="36" height="1.5" rx="0.75" fill="rgba(100,160,255,0.18)"/>
        </svg>
        <span class="file-ext-badge" id="unsupported-ext"></span>
      </div>
      <div class="unsupported-name" id="unsupported-name"></div>
      <div class="unsupported-meta" id="unsupported-meta"></div>
    </div>
  </div>
</div>

<a href="/" id="back" class="btn">
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
    <path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  назад
</a>

<div id="info">
  <div id="filename">—</div>
  <div id="meta"></div>
</div>

<div id="actions">
  <a id="dl-btn" class="btn" download>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M6 2v6M3 6l3 3 3-3M2 10h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    скачать
  </a>
  <button id="expand-btn" class="btn" style="display:none" onclick="toggleExpand()">
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
    <path d="M2 4.5V2h2.5M9.5 2H12v2.5M9.5 10H12V7.5M2 7.5V10h2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span id="expand-label">развернуть</span>
</button>
</div>
<div id="zoom-hint">двойной тап — зум</div>
<script>
(async function () {
const zoomHint = document.getElementById('zoom-hint');
const isMobile = 'ontouchstart' in window;
function buildMeta(parts) {
  if (isMobile) parts = parts.slice(0, 2); // только первые 2 поля
  return parts.join('  ·  ');
}
  const lowPerf = (
    navigator.hardwareConcurrency <= 2 ||
    window.matchMedia('(prefers-reduced-motion: reduce)').matches
  );
  if (lowPerf) document.documentElement.classList.add('no-animation');

  /* ── particles ── */
  if (!lowPerf) {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const COUNT = Math.min(isMobile ? 80 : 160, Math.floor(innerWidth * 0.12));
    class P {
      constructor(ry) { this.reset(ry); }
      reset(ry) {
        this.x = Math.random() * W;
        this.y = ry ? Math.random() * H : H + 10;
        this.r = Math.random() * 1.5 + 0.3;
        this.s = Math.random() * 1.3 + 0.5;
        this.d = (Math.random() - 0.5) * 0.2;
        this.a = Math.random() * 0.65 + 0.15;
        this.ph = Math.random() * Math.PI * 2;
      }
      tick() {
        this.y -= this.s; this.x += this.d; this.ph += 0.018;
        this.ca = this.a * (0.75 + 0.25 * Math.sin(this.ph));
        if (this.y < -6) this.reset(false);
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(110,170,255,${this.ca.toFixed(3)})`;
        ctx.fill();
      }
    }
    const pts = Array.from({ length: COUNT }, () => new P(true));
    function animate() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(8,11,16,0.18)';
      ctx.fillRect(0, 0, W, H);
      pts.forEach(p => { p.tick(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
    if (!isMobile) {
    const fog = document.getElementById('fog');
    let tx = 0, ty = 0, cx = 0, cy = 0;
    document.addEventListener('mousemove', e => {
      tx = (e.clientX - innerWidth  / 2) / (innerWidth  / 2);
      ty = (e.clientY - innerHeight / 2) / (innerHeight / 2);
    });
      function ploop() {
      cx += (tx - cx) * 0.06;
      cy += (ty - cy) * 0.06;
      fog.style.transform    = `translate(${cx * 22}px, ${cy * 14}px)`;
      canvas.style.transform = `translate(${cx * 22}px, ${cy * 14}px)`;
      requestAnimationFrame(ploop);
    }
    ploop();
  }
  }

  /* ── file loading ── */
  const params   = new URLSearchParams(location.search);
  const fileUrl  = params.get('file');
  const viewer   = document.getElementById('viewer');
  const errorEl  = document.getElementById('error');
  const errorMsg = document.getElementById('error-msg');
  const fnEl     = document.getElementById('filename');
  const metaEl   = document.getElementById('meta');
  const dlBtn    = document.getElementById('dl-btn');

  dlBtn.style.display = 'none';

  function showError(msg) {
    errorMsg.textContent = msg;
    errorEl.classList.add('show');
  }

  function formatSize(bytes) {
    if (!bytes || bytes <= 0) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  function getExt(name) {
    const parts = name.split('.');
    return parts.length > 1 ? parts.pop().toLowerCase() : '';
  }

  function getType(ext) {
    if (['mp4','webm','ogg','mov'].includes(ext)) return 'video';
    if (['jpg','jpeg','png','gif','webp','avif','svg'].includes(ext)) return 'image';
    if (['mp3','wav','flac','aac'].includes(ext)) return 'audio';
    if (['txt','log','md','csv','json','xml','ini','env','yaml','yml'].includes(ext)) return 'text';
    return null;
  }

  if (!fileUrl) {
    fnEl.textContent = 'нет файла';
    return;
  }

  const rawName = decodeURIComponent(fileUrl.split('/').pop());
  const ext     = getExt(rawName);
  const fileType = getType(ext);

  fnEl.textContent = rawName;
  dlBtn.href = fileUrl;
  dlBtn.setAttribute('download', rawName);

  /* ── проверяем существование файла ── */
  try {
    const check = await fetch(fileUrl, { method: 'HEAD' });
    const ct = check.headers.get('content-type') || '';
    if (!check.ok || ct.startsWith('text/html')) {
      showError('Файл не найден на сервере');
      return;
    }
    dlBtn.style.display = '';
  } catch {
    showError('Не удалось подключиться к серверу');
    return;
  }

  function fetchSize(callback) {
    fetch(fileUrl, { method: 'HEAD' })
      .then(r => {
        const size = r.headers.get('content-length');
        const modified = r.headers.get('last-modified');
        const dateStr = modified
          ? new Date(modified).toLocaleDateString('ru', { day:'numeric', month:'long', year:'numeric' })
          : '';
        callback(size ? formatSize(parseInt(size)) : '', dateStr);
      })
      .catch(() => callback('', ''));
  }

  /* ── unsupported ── */
  if (!fileType) {
    const unsupEl = document.getElementById('unsupported');
    unsupEl.classList.add('show');
    document.getElementById('unsupported-ext').textContent  = ext ? '.' + ext : '';
    document.getElementById('unsupported-name').textContent = rawName;
    fetchSize((sizeStr, dateStr) => {
      const parts = [];
      if (ext) parts.push('.' + ext.toUpperCase());
      if (sizeStr) parts.push(sizeStr);
      if (dateStr) parts.push(dateStr);
      document.getElementById('unsupported-meta').textContent = parts.join('  ·  ');
      metaEl.textContent = parts.join('  ·  ');
    });
    return;
  }

  /* ── создаём медиа-элемент ── */
  let el;

  if (fileType === 'video') {
    el = document.createElement('video');
    el.controls = true;
    el.autoplay = false;
    el.playsinline = true;
    el.src = fileUrl;
    el.addEventListener('loadedmetadata', () => {
      const d = Math.round(el.duration);
      const m = Math.floor(d / 60), s = d % 60;
      const dim = el.videoWidth ? `${el.videoWidth}×${el.videoHeight}` : '';
      fetchSize((sizeStr, dateStr) => {
        const parts = [];
        if (dim) parts.push(dim);
        parts.push(`${m}:${String(s).padStart(2,'0')}`);
        if (sizeStr) parts.push(sizeStr);
        if (dateStr) parts.push(dateStr);
        metaEl.textContent = buildMeta(parts);
      });
    });
    el.addEventListener('error', () => showError('Не удалось загрузить видео'));

  } else if (fileType === 'image') {
    el = document.createElement('img');
    el.src = fileUrl;
    el.alt = rawName;
    el.addEventListener('load', () => {
      fetchSize((sizeStr, dateStr) => {
        const parts = [];
        if (el.naturalWidth) parts.push(`${el.naturalWidth}×${el.naturalHeight}`);
        if (sizeStr) parts.push(sizeStr);
        if (dateStr) parts.push(dateStr);
        metaEl.textContent = buildMeta(parts);
      });
    });
    if (isMobile) {
      zoomHint.classList.add('show');
      setTimeout(() => zoomHint.classList.remove('show'), 2600);
    }
    el.addEventListener('error', () => showError('Не удалось загрузить изображение'));

  } else if (fileType === 'audio') {
    el = document.createElement('audio');
    el.controls = true;
    el.src = fileUrl;
    el.addEventListener('loadedmetadata', () => {
      const d = Math.round(el.duration);
      const m = Math.floor(d / 60), s = d % 60;
      fetchSize((sizeStr, dateStr) => {
        const parts = [`${m}:${String(s).padStart(2,'0')}`];
        if (sizeStr) parts.push(sizeStr);
        if (dateStr) parts.push(dateStr);
        metaEl.textContent = buildMeta(parts);
      });
    });
    el.addEventListener('error', () => showError('Не удалось загрузить аудио'));
  } else if (fileType === 'text') {
  el = document.createElement('pre');
    document.getElementById('expand-btn').style.display = '';
  el.style.cssText = `
    margin: 0;
    padding: 2rem;
    max-width: min(860px, calc(100vw - 4rem));
    max-height: calc(100vh - 9rem);
    overflow: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
  `;
  fetch(fileUrl)
    .then(r => r.text())
    .then(text => {
      el.textContent = text;
      fetchSize(sizeStr => {
        const lines = text.split('\n').length;
        const chars = text.length;
        const parts = [`${lines} строк`, `${chars.toLocaleString('ru')} симв.`];
        if (sizeStr) parts.push(sizeStr);
        metaEl.textContent = parts.join('  ·  ');
      });
    })
    .catch(() => showError('Не удалось загрузить файл'));
}

  /* ── вставляем в DOM ── */
  if (fileType === 'audio' && el) {
    const audioWrap = document.createElement('div');
    audioWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:1rem;padding:3.5rem 3rem;';

    const iconWrap = document.createElement('div');
    iconWrap.style.cssText = 'position:relative;width:72px;height:88px;';
    iconWrap.innerHTML = `
      <svg viewBox="0 0 72 88" width="72" height="88" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 6C4 2.686 6.686 0 10 0H46L68 22V82C68 85.314 65.314 88 62 88H10C6.686 88 4 85.314 4 82V6Z"
              fill="rgba(100,160,255,0.08)" stroke="rgba(100,160,255,0.22)" stroke-width="1.2"/>
        <path d="M46 0L68 22H50C47.791 22 46 20.209 46 18V0Z"
              fill="rgba(100,160,255,0.15)" stroke="rgba(100,160,255,0.22)" stroke-width="1.2"/>
        <rect x="30" y="40" width="5" height="9" rx="1.5" fill="rgba(100,160,255,0.65)"/>
        <path d="M35 41.5 L41 37 L41 52 L35 47.5Z" fill="rgba(100,160,255,0.5)"/>
        <path d="M43.5 40 C46 42 46 47 43.5 49" stroke="rgba(100,160,255,0.6)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <path d="M46 37.5 C50 41 50 48 46 51.5" stroke="rgba(100,160,255,0.4)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      </svg>
      <span style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:0.65rem;font-weight:500;letter-spacing:0.06em;color:#d0dff5;text-transform:uppercase;opacity:0.85;font-family:'JetBrains Mono',monospace;white-space:nowrap;">.${ext}</span>
    `;

    const nameEl = document.createElement('div');
    nameEl.textContent = rawName;
    nameEl.style.cssText = 'font-size:0.9rem;font-weight:500;color:#d0dff5;text-align:center;word-break:break-all;max-width:260px;font-family:"JetBrains Mono",monospace;';

    audioWrap.append(iconWrap, nameEl, el);
    viewer.appendChild(audioWrap);
  } else if (el) {
    viewer.appendChild(el);
  }

/* ═══════════════════════════════════════════
   ── ЗУМ + ПАН (мышь + тач + double-tap) ──
   ═══════════════════════════════════════════ */
const UI_IDS_EL = ['info', 'actions', 'back'].map(id => document.getElementById(id));
let scale = 1;
let panX = 0, panY = 0;
let isPanning = false;
let startX = 0, startY = 0;
let uiVisible = true;
const MIN = 1, MAX = 6;

function clampPan() {
  if (!el || scale <= 1) { panX = 0; panY = 0; return; }
  const rect = el.getBoundingClientRect();
  const maxX = Math.max(0, (rect.width  * scale - innerWidth)  / 2 + rect.width  * 0.1);
  const maxY = Math.max(0, (rect.height * scale - innerHeight) / 2 + rect.height * 0.1);
  panX = Math.min(maxX, Math.max(-maxX, panX));
  panY = Math.min(maxY, Math.max(-maxY, panY));
}

function applyTransform(animate = false) {
  if (!el) return;
  clampPan();
  el.style.transition = animate ? 'transform 0.22s cubic-bezier(0.22,1,0.36,1)' : 'none';
  el.style.transform  = `scale(${scale}) translate(${panX / scale}px, ${panY / scale}px)`;
}

function setUIVisible(visible) {
  if (uiVisible === visible) return;
  uiVisible = visible;
  if (!visible) {
    UI_IDS_EL.forEach(e => e && e.classList.add('hidden'));
    viewer.classList.add('zoomed-out');
    document.body.classList.add('bg-blur');
  } else {
    UI_IDS_EL.forEach(e => e && e.classList.remove('hidden'));
    viewer.classList.remove('zoomed-out');
    document.body.classList.remove('bg-blur');
  }
}

function onZoomChange() {
  const isZoomed = scale > 1.01;
  viewer.style.overflow = isZoomed ? 'visible' : 'hidden';
  setUIVisible(!isZoomed);
  if (!isZoomed) { panX = 0; panY = 0; }
}

/* колесо */
document.addEventListener('wheel', e => {
  if (fileType === 'audio' || fileType === 'text') return;
  e.preventDefault();
  const STEP = 0.0012;
  const prev = scale;
  scale = Math.min(MAX, Math.max(MIN, scale - e.deltaY * STEP));
  if (el && scale !== prev) {
    const rect = el.getBoundingClientRect();
    const cx   = e.clientX - (rect.left + rect.width  / 2);
    const cy   = e.clientY - (rect.top  + rect.height / 2);
    panX += cx * (1 - scale / prev);
    panY += cy * (1 - scale / prev);
  }
  onZoomChange();
  applyTransform();
}, { passive: false });

/* мышь: пан */
viewer.addEventListener('mousedown', e => {
  if (scale <= 1) return;
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
  viewer.style.cursor = 'grabbing';
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  applyTransform();
});
document.addEventListener('mouseup', () => {
  if (!isPanning) return;
  isPanning = false;
  viewer.style.cursor = scale > 1 ? 'grab' : '';
});
viewer.addEventListener('mousemove', () => {
  if (!isPanning) viewer.style.cursor = scale > 1 ? 'grab' : '';
});

/* тач: пинч-зум + пан + double-tap */
if (fileType === 'image' || fileType === 'video') {
  let lastTouchDist  = null;
  let lastTapTime    = 0;
  let touchPanActive = false;
  let tStartX = 0, tStartY = 0;
  let pinchCenterX = 0, pinchCenterY = 0;

  viewer.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      touchPanActive = false;
      const t0 = e.touches[0], t1 = e.touches[1];
      lastTouchDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
      pinchCenterX  = (t0.clientX + t1.clientX) / 2;
      pinchCenterY  = (t0.clientY + t1.clientY) / 2;
      e.preventDefault();
    } else if (e.touches.length === 1) {
      const now = Date.now();
      const t   = e.touches[0];
      if (now - lastTapTime < 300) {
        lastTapTime = 0;
        if (scale > 1.01) {
          scale = 1; panX = 0; panY = 0;
        } else {
          scale = 2.5;
          if (el) {
            const rect = el.getBoundingClientRect();
            panX = (t.clientX - (rect.left + rect.width  / 2)) * (1 - scale);
            panY = (t.clientY - (rect.top  + rect.height / 2)) * (1 - scale);
          }
        }
        onZoomChange();
        applyTransform(true);
        e.preventDefault();
        return;
      }
      lastTapTime = now;
      if (scale > 1) {
        touchPanActive = true;
        tStartX = t.clientX - panX;
        tStartY = t.clientY - panY;
      }
    }
  }, { passive: false });

  viewer.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && lastTouchDist !== null) {
      e.preventDefault();
      const t0   = e.touches[0], t1 = e.touches[1];
      const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
      const prev = scale;
      scale = Math.min(MAX, Math.max(MIN, scale * (dist / lastTouchDist)));
      const newCX = (t0.clientX + t1.clientX) / 2;
      const newCY = (t0.clientY + t1.clientY) / 2;
      if (el && scale !== prev) {
        panX += (newCX - pinchCenterX);
        panY += (newCY - pinchCenterY);
      }
      pinchCenterX  = newCX;
      pinchCenterY  = newCY;
      lastTouchDist = dist;
      onZoomChange();
      applyTransform();
    } else if (e.touches.length === 1 && touchPanActive) {
      e.preventDefault();
      panX = e.touches[0].clientX - tStartX;
      panY = e.touches[0].clientY - tStartY;
      applyTransform();
    }
  }, { passive: false });

  viewer.addEventListener('touchend', e => {
    if (e.touches.length < 2) lastTouchDist = null;
    if (e.touches.length === 0) touchPanActive = false;
  });
}

/* снимаем fadeIn */
['info', 'actions', 'back'].forEach(id => {
  const node = document.getElementById(id);
  if (node) node.addEventListener('animationend', () => {
    node.style.animation = 'none';
  }, { once: true });
});
let expanded = false;
window.toggleExpand = function() {
  expanded = !expanded;
  const pre = document.querySelector('#viewer pre');
  if (!pre) return;
  if (expanded) {
    pre.style.maxWidth   = 'calc(100vw - 4rem)';
    pre.style.maxHeight  = 'calc(100vh - 7rem)';
    viewer.style.maxWidth  = 'calc(100vw - 4rem)';
    viewer.style.maxHeight = 'calc(100vh - 7rem)';
  } else {
    pre.style.maxWidth   = 'min(860px, calc(100vw - 4rem))';
    pre.style.maxHeight  = 'calc(100vh - 9rem)';
    viewer.style.maxWidth  = 'min(960px, 100%)';
    viewer.style.maxHeight = 'calc(100vh - 9rem)';
  }
  document.getElementById('expand-label').textContent = expanded ? 'свернуть' : 'развернуть';
};
})();
</script>
</body>
</html>
