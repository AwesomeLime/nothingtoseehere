<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nothing to see here...</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #080b10;
      --particle-color: rgba(100, 160, 255, 0.55);
      --glow: rgba(80, 140, 255, 0.08);
      --text-primary: #d0dff5;
      --text-secondary: rgba(140, 165, 210, 0.6);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Canvas layer ── */
    #canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
      will-change: transform;
      transition: transform 0.12s ease-out;
    }

    /* ── Parallax fog layer ── */
    #fog {
      position: fixed;
      inset: -10%;
      width: 120%;
      height: 120%;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 40% 60%, rgba(30, 60, 140, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 70% 30%, rgba(15, 40, 100, 0.12) 0%, transparent 60%);
      transition: transform 0.12s ease-out;
      will-change: transform;
    }

    /* ── Content ── */
    #content {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      pointer-events: none;
      transition: transform 0.18s ease-out;
      will-change: transform;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 3rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      text-shadow:
        0 0 40px rgba(100, 160, 255, 0.35),
        0 0 80px rgba(80, 130, 255, 0.12);
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    p {
      font-size: clamp(0.75rem, 2vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.65s forwards;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Reduced-motion / low-perf fallback ── */
    .no-animation #canvas { display: none; }
    .no-animation #fog    { display: none; }
    .no-animation body    { background: #05070c; }
    .no-animation #content { position: fixed; transform: none !important; }
    .no-animation h1,
    .no-animation p { animation: none; opacity: 1; }
    .no-animation h1::after { display: none; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>
  <div id="fog"></div>

  <div id="content">
    <h1 id="typewriter"></h1>
    <p>Ну серьёзно, тут нечего смотреть</p>
  </div>

  <script>
  (function () {
    /* ── Performance detection ── */
    const lowPerf = (
      navigator.hardwareConcurrency <= 2 ||
      /Android.*(Mobile)|iPhone|iPod/.test(navigator.userAgent) && window.devicePixelRatio < 2 ||
      window.matchMedia('(prefers-reduced-motion: reduce)').matches
    );

    if (lowPerf) {
      document.documentElement.classList.add('no-animation');
      return;
    }

    /* ── Canvas particles ── */
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const PARTICLE_COUNT = Math.min(180, Math.floor(window.innerWidth * 0.14));

    class Particle {
      constructor(randomY) {
        this.reset(randomY);
      }
      reset(randomY) {
        this.x     = Math.random() * W;
        this.y     = randomY ? Math.random() * H : H + Math.random() * 40;
        this.size  = Math.random() * 1.6 + 0.3;
        this.speed = Math.random() * 1.4 + 0.5;
        this.drift = (Math.random() - 0.5) * 0.25;
        this.alpha = Math.random() * 0.7 + 0.15;
        this.pulse = Math.random() * Math.PI * 2; // phase offset
      }
      update(t) {
        this.y     -= this.speed;
        this.x     += this.drift;
        this.pulse += 0.018;
        // subtle brightness pulse
        this.currentAlpha = this.alpha * (0.75 + 0.25 * Math.sin(this.pulse));
        if (this.y < -6) this.reset(false);
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(110,170,255,${this.currentAlpha.toFixed(3)})`;
        ctx.fill();
      }
    }

    const particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle(true));

    let frameId;
    function animate(t) {
      ctx.clearRect(0, 0, W, H);

      // subtle scanline atmosphere
      ctx.fillStyle = 'rgba(8,11,16,0.18)';
      ctx.fillRect(0, 0, W, H);

      for (const p of particles) {
        p.update(t);
        p.draw();
      }
      frameId = requestAnimationFrame(animate);
    }
    frameId = requestAnimationFrame(animate);

    /* ── Parallax on mousemove ── */
    const fog     = document.getElementById('fog');
    const content = document.getElementById('content');
    let targetX = 0, targetY = 0;
    let curX = 0, curY = 0;

    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;
      targetX = (e.clientX - cx) / cx;
      targetY = (e.clientY - cy) / cy;
    });

    function lerp(a, b, t) { return a + (b - a) * t; }

    function parallaxLoop() {
      curX = lerp(curX, targetX, 0.06);
      curY = lerp(curY, targetY, 0.06);

      // fog moves more, content moves subtly in opposite direction
      fog.style.transform     = `translate(${curX * 22}px, ${curY * 14}px)`;
      canvas.style.transform = `translate(${curX * 22}px, ${curY * 14}px)`;

      requestAnimationFrame(parallaxLoop);
    }
    parallaxLoop();
          /* ── Typewriter dots ── */
      const el   = document.getElementById('typewriter');
      const base = 'Nothing to see here';
      const dots = '...';
      const PAUSE   = 1200;
      const T_TYPE  = 120;
      const T_ERASE = 0;

      let i = 0, erasing = false;

      function tick() {
        if (!erasing) {
          i++;
          el.textContent = base + dots.slice(0, i);
          if (i === dots.length) { erasing = true; setTimeout(tick, PAUSE); return; }
        } else {
          i--;
          el.textContent = base + dots.slice(0, i);
if (i === 0) { erasing = false; el.textContent = base; setTimeout(tick, PAUSE); return; }
        }
        setTimeout(tick, erasing ? T_ERASE : T_TYPE);
      }

      setTimeout(tick, 600);
      })();
  </script>
</body>
</html>
